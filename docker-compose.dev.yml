services:
  frontend:
    profiles:
      - docker-front

  backend:
    environment:
      NODE_ENV: development
      DB_SYNC_ALTER: "true"

  nginx:
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
