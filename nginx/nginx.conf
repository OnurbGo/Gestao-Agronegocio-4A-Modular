events {}

http {
    client_max_body_size 10M;

    upstream backend_upstream {
        server backend:3000;
    }

    server {
        listen 80;

        location = / {
            default_type application/json;
            return 200 '{"message":"Nginx ativo. O frontend nao e servido por este container."}';
        }

        location /core/ {
            proxy_pass http://backend_upstream/core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /escritorio/ {
            proxy_pass http://backend_upstream/escritorio/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api-docs.json {
            proxy_pass http://backend_upstream/api-docs.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api-docs {
            proxy_pass http://backend_upstream/api-docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api-docs/ {
            proxy_pass http://backend_upstream/api-docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            default_type application/json;
            return 404 '{"message":"Frontend fora do Docker. Configure o frontend em outro servidor/hosting."}';
        }
    }
}
