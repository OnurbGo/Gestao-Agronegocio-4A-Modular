events {}

http {
    include /etc/nginx/mime.types;
    client_max_body_size 10M;

    upstream core_upstream {
        server core-service:3000;
    }

    upstream escritorio_upstream {
        server escritorio-service:3000;
    }

    upstream silo_upstream {
        server silo-service:3000;
    }

    upstream swagger_upstream {
        server swagger-service:3000;
    }

    upstream login_home_front_upstream {
        server front-login-home:80;
    }

    upstream escritorio_front_upstream {
        server front-escritorio:80;
    }

    upstream silo_front_upstream {
        server front-silo:80;
    }

    server {
        # HOMOLOGAÇÃO LOCAL TEMPORÁRIA:
        # O Nginx escuta na porta 80 e permite que outros computadores da mesma rede local
        # acessem o sistema pelo IP deste PC/servidor local.
        # Exemplo: http://IP_DO_PC
        #
        # FUTURO:
        # Esta exposição local poderá ser substituída ou complementada por Cloudflare Tunnel,
        # domínio próprio e HTTPS, sem abrir portas diretamente no roteador.
        # Não tratar esta configuração como publicação definitiva em produção externa.
        listen 80;

        location = /api-docs {
            return 301 /api-docs/;
        }

        location /api-docs/ {
            proxy_pass http://swagger_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/core/ {
            proxy_pass http://core_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/escritorio/ {
            proxy_pass http://escritorio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/silo/ {
            proxy_pass http://silo_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /escritorio/ {
            proxy_pass http://escritorio_front_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /silo/ {
            proxy_pass http://silo_front_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://login_home_front_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
