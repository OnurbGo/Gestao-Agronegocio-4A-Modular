events {}

http {
    include /etc/nginx/mime.types;
    client_max_body_size 10M;

    upstream core_upstream {
        server core-service:3000;
    }

    upstream escritorio_upstream {
        server escritorio-service:3000;
    }

    upstream login_home_dev_upstream {
        server host.docker.internal:5173;
    }

    upstream escritorio_dev_upstream {
        server host.docker.internal:5174;
    }

    server {
        listen 80;

        location /api-docs/ {
            alias /usr/share/nginx/html/api-docs/;
            try_files $uri $uri/ /api-docs/index.html;
        }

        location /api/core/ {
            proxy_pass http://core_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/escritorio/ {
            proxy_pass http://escritorio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /escritorio/ {
            proxy_pass http://escritorio_dev_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://login_home_dev_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
