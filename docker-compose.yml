services:
  db:
    image: mysql:8.0
    container_name: gestao-agro-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_agro}
      MYSQL_USER: ${MYSQL_USER:-gestao_agro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao-agro-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-gestao_agro}
      DB_PASS: ${MYSQL_PASSWORD:-change-me}
      DB_NAME: ${MYSQL_DATABASE:-gestao_agro}
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      AUTH_CACHE_TTL_MS: ${AUTH_CACHE_TTL_MS:-15000}
      UPLOAD_ROOT: /app/uploads
      USER_UPLOAD_DIR: /app/uploads/usuarios
      ESCRITORIO_UPLOAD_DIR: /app/uploads/escritorio
      DOCUMENT_UPLOAD_MAX_BYTES: ${DOCUMENT_UPLOAD_MAX_BYTES:-26214400}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - uploads:/app/uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_BASE_PATH: /
    container_name: gestao-agro-frontend
    restart: always
    expose:
      - "80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: gestao-agro-nginx
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - app-network

volumes:
  mysql_data:
  uploads:

networks:
  app-network:
    driver: bridge
